name: quarto play pages
on:
  push:
    paths: 
     - "_quarto.yml"
     - "**/*.qmd"
    branches: [ main ]
  workflow_dispatch:

# 14056.f1
# name: R-CMD-check
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  # contents: read
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    #  env: 
     #  testcacher
    container:
      image: ghcr.io/${{ github.repository_owner }}/quarto-r-tex:latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
    - name: chk vars
      run: |
         ls -la
         echo "DOWNLOAD_PW=${{ secrets.DOWNLOAD_PW }}" >> .Renviron
        
    - name: Render Quarto site
      env:
          DOWNLOAD_PW: ${{ secrets.DOWNLOAD_PW }}
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright/chromium-1208/chrome-linux64/chrome
      run: |
         # SHORT_SHA=$(git rev-parse --short HEAD)
         # quarto render play/quarto/start -M git-hash=${{ github.sha }} -M testmeta=16156.t1
         quarto render
         # echo "---- q content..."
         # ls play/quarto/output
         # echo "---- q/publx content..."
         # ls q/publx/
         # echo "---- ls 001"
         # ls q/publx/001
    # - name: Upload rendered HTML directory
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: output # target
    #     path: play/quarto/output  
    # - name: build pages
    #   id: pages
    #   uses: actions/configure-pages@v4
     
    # - name: Upload pages
    #   uses: actions/upload-pages-artifact@v3
    #   with:
    #     path: ./play/quarto/output
    - name: Checkout gh-pages into ./site-current
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: site-current

    - name: Merge rendered output into existing site
      run: |
          # copies new/updated files; does NOT delete existing ones
          # ls -R ./play/quarto/output
          
          rsync -av ./_site/ site-current/docs
          ls -R site-current/docs
          #cp -Ra ./play/quarto/output/. site-current/docs/
          #cp -a ./play/quarto/output/. docs/

    - name: Commit and push
      run: |
          cd site-current
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
    
